name: CI

on:
  pull_request:
    branches: [main, release]
  push:
    branches: [main, release]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/notetaker-*
          key: deriveddata-${{ runner.os }}-${{ hashFiles('notetaker.xcodeproj/**', 'notetaker/**/*.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build (Debug)
        run: |
          set -euo pipefail
          xcodebuild -scheme notetaker -configuration Debug build \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -5

      - name: Build Release Archive
        run: |
          set -euo pipefail
          xcodebuild -scheme notetaker -configuration Release \
            -destination 'platform=macOS' \
            -archivePath "$RUNNER_TEMP/notetaker.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive 2>&1 | tail -10

      - name: Export App from Archive
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/notetaker.xcarchive/Products/Applications/notetaker.app"
          if [ -d "$APP_PATH" ]; then
            mkdir -p "$RUNNER_TEMP/artifact"
            cp -R "$APP_PATH" "$RUNNER_TEMP/artifact/"
          else
            echo "App not found at $APP_PATH, listing archive contents:"
            find "$RUNNER_TEMP/notetaker.xcarchive" -maxdepth 4 -type d
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: notetaker-${{ github.sha }}
          path: ${{ runner.temp }}/artifact/notetaker.app
          retention-days: 30

      - name: Run Full Tests
        run: |
          set -uo pipefail
          xcodebuild -scheme notetaker -configuration Debug \
            -testPlan FullTests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee /tmp/test-output.txt | \
            grep -E '(Test Case|Test Suite|Executed|FAIL|error:|passed|failed|\*\*|Testing)' || true
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "=== LAST 50 LINES ==="
            tail -50 /tmp/test-output.txt
          fi
          exit $EXIT_CODE
