name: CI

on:
  pull_request:
    branches: [main, release]
  push:
    branches: [main, release]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/notetaker-*
          key: deriveddata-${{ runner.os }}-${{ hashFiles('notetaker.xcodeproj/**', 'notetaker/**/*.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild -scheme notetaker -configuration Debug build \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -5

      - name: Run Full Tests
        run: |
          set -euo pipefail
          xcodebuild -scheme notetaker -configuration Debug \
            -testPlan FullTests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tail -20
