name: CI

on:
  pull_request:
    branches: [main, release]
  push:
    branches: [main, release]

permissions:
  contents: read
  issues: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild -scheme notetaker -configuration Debug build \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -5

      - name: Check macOS version
        id: os-check
        run: |
          set -euo pipefail
          MACOS_MAJOR=$(sw_vers -productVersion | cut -d. -f1)
          echo "macOS major version: $MACOS_MAJOR"
          if [ "$MACOS_MAJOR" -ge 26 ]; then
            echo "can_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_test=false" >> "$GITHUB_OUTPUT"
            echo "::warning::macOS $MACOS_MAJOR < 26 — skipping tests (deployment target requires macOS 26.2+)"
          fi

      - name: Run Unit Tests
        if: steps.os-check.outputs.can_test == 'true'
        run: |
          set -euo pipefail
          xcodebuild -scheme notetaker -configuration Debug \
            -testPlan UnitTests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tail -20

      - name: Report skipped tests
        if: steps.os-check.outputs.can_test == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'CI: tests skipped — runner macOS version < 26';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci',
              per_page: 100,
            });
            const existing = issues.find(i => i.title === title);
            const runURL = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Tests skipped in [run #${context.runId}](${runURL}) on \`${context.sha.slice(0,7)}\` (${context.ref}) — runner macOS version does not meet deployment target (26.2+).`;

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              console.log(`Commented on existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `GitHub-hosted runners currently run macOS 15, which cannot execute tests targeting macOS 26.2+. Build succeeds (cross-compilation via Xcode 26 SDK) but tests are skipped.\n\n**Action needed:** Upgrade to macOS 26 runner or use a self-hosted runner.\n\n---\n\n${body}`,
                labels: ['ci'],
              });
              console.log('Created new issue');
            }
