name: CI

on:
  pull_request:
    branches: [main, release]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'
      - 'CLAUDE.md'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/TranscribeNote-*
          key: deriveddata-${{ runner.os }}-${{ hashFiles('TranscribeNote.xcodeproj/**', 'TranscribeNote/**/*.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild -scheme TranscribeNote -configuration Debug build \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -5

      - name: Run Full Tests
        run: |
          set -uo pipefail
          xcodebuild -scheme TranscribeNote -configuration Debug \
            -testPlan FullTests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee /tmp/test-output.txt | \
            grep -E '(Test Case|Test Suite|Executed|FAIL|error:|passed|failed|\*\*|Testing)' || true
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "=== LAST 50 LINES ==="
            tail -50 /tmp/test-output.txt
          fi
          exit $EXIT_CODE
